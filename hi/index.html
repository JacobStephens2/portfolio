<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="/bee-favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scan to connect | Jacob Stephens</title>
    <meta name="description" content="Scan the QR code to save Jacob Stephens' contact details.">
    <meta property="og:title" content="Jacob Stephens - digital business card">
    <meta property="og:description" content="Scan the QR code to save my contact details.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://stephens.page/hi">
    <meta name="twitter:card" content="summary">
    <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@600;700&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #181512;
            --brand: #9b4d24;
            --muted: #625a52;
            --surface: #ffffff;
            --rule: #d6d1c9;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            font-family: 'Source Sans 3', Arial, Helvetica, sans-serif;
            background: var(--surface);
            color: var(--ink);
            min-height: 100svh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 1.4rem;
            padding: 1.5rem;
        }
        .name {
            font-family: 'Source Serif 4', Georgia, serif;
            font-weight: 700;
            font-size: clamp(1.6rem, 4vw, 2.2rem);
            letter-spacing: -0.01em;
        }
        .lead {
            color: var(--muted);
            font-size: clamp(1rem, 2.5vw, 1.15rem);
        }
        .qr {
            display: inline-block;
            line-height: 0;
            border: 1px solid var(--rule);
            border-radius: 14px;
            padding: clamp(0.75rem, 2vw, 1.25rem);
            background: #fff;
        }
        .qr img {
            display: block;
            width: min(78vw, 60svh, 380px);
            height: auto;
            aspect-ratio: 1 / 1;
        }
        .fallback {
            color: var(--muted);
            font-size: 0.95rem;
        }
        .fallback a {
            color: var(--brand);
            text-decoration: none;
            border-bottom: 1px solid currentColor;
        }
        .fallback a:hover,
        .fallback a:focus-visible { color: var(--ink); }
    </style>
</head>
<body>
    <h1 class="name">Jacob Stephens</h1>
    <p class="lead">Scan to save my contact</p>

    <a class="qr" href="/card" aria-label="Save Jacob Stephens' contact card">
        <img src="digital-business-card-qr-code.png" alt="QR code linking to Jacob Stephens' digital business card">
    </a>

    <p class="fallback">On this screen? <a href="/card">Open the card</a></p>
</body>
</html>
