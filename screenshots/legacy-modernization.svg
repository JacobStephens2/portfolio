<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" font-family="system-ui,-apple-system,sans-serif">
  <defs>
    <linearGradient id="bgL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3a2418"/>
      <stop offset="1" stop-color="#5b3220"/>
    </linearGradient>
    <linearGradient id="bgR" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2d8059"/>
      <stop offset="1" stop-color="#205b3f"/>
    </linearGradient>
    <filter id="sh">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.30"/>
    </filter>
    <marker id="arr" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#f6f1e8"/>
    </marker>
  </defs>
  <rect width="1200" height="760" fill="#181512"/>

  <text x="600" y="56" font-size="22" font-weight="700" fill="#f6f1e8" text-anchor="middle">Enterprise Modernization · production migrated underneath a 40-person business</text>
  <text x="600" y="80" font-size="13" fill="#a3958a" text-anchor="middle">PHP 5.6 → PHP 8 · MySQL 5.7 → 8.4 LTS · CentOS 7 → Rocky Linux 9</text>

  <!-- before column -->
  <g filter="url(#sh)">
    <rect x="80" y="120" width="440" height="540" rx="14" fill="url(#bgL)" stroke="#7a4a30"/>
    <text x="100" y="160" font-size="13" font-weight="700" fill="#f6f1e8" letter-spacing="2">BEFORE</text>
    <text x="100" y="190" font-size="22" font-weight="700" fill="#f6f1e8">Aging stack, expiring runway</text>

    <g font-size="13">
      <rect x="100" y="220" width="400" height="48" rx="6" fill="#2a1c12" stroke="#5b3a23"/>
      <text x="116" y="240" font-weight="700" fill="#f6f1e8">PHP 5.6</text>
      <text x="116" y="258" fill="#c8b6aa">EOL since 2019 · magic_quotes · mysql_*</text>

      <rect x="100" y="280" width="400" height="48" rx="6" fill="#2a1c12" stroke="#5b3a23"/>
      <text x="116" y="300" font-weight="700" fill="#f6f1e8">MySQL 5.7</text>
      <text x="116" y="318" fill="#c8b6aa">past primary support · weak utf8</text>

      <rect x="100" y="340" width="400" height="48" rx="6" fill="#2a1c12" stroke="#5b3a23"/>
      <text x="116" y="360" font-weight="700" fill="#f6f1e8">CentOS 7</text>
      <text x="116" y="378" fill="#c8b6aa">aging out of support window</text>

      <rect x="100" y="400" width="400" height="48" rx="6" fill="#2a1c12" stroke="#5b3a23"/>
      <text x="116" y="420" font-weight="700" fill="#f6f1e8">Codebase drift</text>
      <text x="116" y="438" fill="#c8b6aa">deprecation warnings everywhere</text>

      <rect x="100" y="460" width="400" height="48" rx="6" fill="#2a1c12" stroke="#5b3a23"/>
      <text x="116" y="480" font-weight="700" fill="#f6f1e8">Inherited dependencies</text>
      <text x="116" y="498" fill="#c8b6aa">PHPMailer, mysql_*, custom session code</text>

      <rect x="100" y="520" width="400" height="48" rx="6" fill="#2a1c12" stroke="#5b3a23"/>
      <text x="116" y="540" font-weight="700" fill="#f6f1e8">Single host per role</text>
      <text x="116" y="558" fill="#c8b6aa">all-or-nothing cutovers</text>

      <rect x="100" y="580" width="400" height="48" rx="6" fill="#2a1c12" stroke="#5b3a23"/>
      <text x="116" y="600" font-weight="700" fill="#f6f1e8">Customers don't pause</text>
      <text x="116" y="618" fill="#c8b6aa">live payments, ACH, ops every day</text>
    </g>
  </g>

  <!-- after column -->
  <g filter="url(#sh)">
    <rect x="680" y="120" width="440" height="540" rx="14" fill="url(#bgR)" stroke="#1f5237"/>
    <text x="700" y="160" font-size="13" font-weight="700" fill="#f1f6f3" letter-spacing="2">AFTER</text>
    <text x="700" y="190" font-size="22" font-weight="700" fill="#f1f6f3">Current, supported, extensible</text>

    <g font-size="13">
      <rect x="700" y="220" width="400" height="48" rx="6" fill="#163d2a" stroke="#1f5237"/>
      <text x="716" y="240" font-weight="700" fill="#f1f6f3">PHP 8 (8.1–8.4)</text>
      <text x="716" y="258" fill="#bcd4c5">typed properties · attributes · CI matrix</text>

      <rect x="700" y="280" width="400" height="48" rx="6" fill="#163d2a" stroke="#1f5237"/>
      <text x="716" y="300" font-weight="700" fill="#f1f6f3">MySQL 8.4 LTS</text>
      <text x="716" y="318" fill="#bcd4c5">utf8mb4 · CTEs · window functions</text>

      <rect x="700" y="340" width="400" height="48" rx="6" fill="#163d2a" stroke="#1f5237"/>
      <text x="716" y="360" font-weight="700" fill="#f1f6f3">Rocky Linux 9</text>
      <text x="716" y="378" fill="#bcd4c5">supported through the next decade</text>

      <rect x="700" y="400" width="400" height="48" rx="6" fill="#163d2a" stroke="#1f5237"/>
      <text x="716" y="420" font-weight="700" fill="#f1f6f3">Codebase audit</text>
      <text x="716" y="438" fill="#bcd4c5">PHPStan · PHPUnit · CI on each PR</text>

      <rect x="700" y="460" width="400" height="48" rx="6" fill="#163d2a" stroke="#1f5237"/>
      <text x="716" y="480" font-weight="700" fill="#f1f6f3">Modern dependencies</text>
      <text x="716" y="498" fill="#bcd4c5">PHPMailer 6.x · Slim 3 API · Composer</text>

      <rect x="700" y="520" width="400" height="48" rx="6" fill="#163d2a" stroke="#1f5237"/>
      <text x="716" y="540" font-weight="700" fill="#f1f6f3">Dual-running cutovers</text>
      <text x="716" y="558" fill="#bcd4c5">old + new together · zero noticed downtime</text>

      <rect x="700" y="580" width="400" height="48" rx="6" fill="#163d2a" stroke="#1f5237"/>
      <text x="716" y="600" font-weight="700" fill="#f1f6f3">Unblocks new work</text>
      <text x="716" y="618" fill="#bcd4c5">Manager sandboxes · agent orchestrator</text>
    </g>
  </g>

  <!-- migration arrow -->
  <line x1="540" y1="390" x2="660" y2="390" stroke="#f6f1e8" stroke-width="3" marker-end="url(#arr)"/>
  <text x="600" y="380" font-size="12" fill="#f6f1e8" text-anchor="middle">migrate</text>
  <text x="600" y="412" font-size="11" fill="#a3958a" text-anchor="middle">in production</text>

  <text x="600" y="704" font-size="12" fill="#a3958a" text-anchor="middle">Customers, staff, payments, and ACH never paused. Every dependency was upgraded with the company still open for business.</text>
</svg>
