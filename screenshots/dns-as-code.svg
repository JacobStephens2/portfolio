<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" font-family="system-ui,-apple-system,sans-serif">
  <defs>
    <linearGradient id="cf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f6821f"/>
      <stop offset="1" stop-color="#c25e12"/>
    </linearGradient>
    <linearGradient id="do" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2d8059"/>
      <stop offset="1" stop-color="#205b3f"/>
    </linearGradient>
    <filter id="sh">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.30"/>
    </filter>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#f6f1e8"/>
    </marker>
  </defs>
  <rect width="1200" height="760" fill="#181512"/>

  <text x="600" y="54" font-size="22" font-weight="700" fill="#f6f1e8" text-anchor="middle">DNS as Code · 221 records across 9 zones, imported live with zero downtime</text>
  <text x="600" y="80" font-size="13" fill="#a3958a" text-anchor="middle">Terraform · Cloudflare · AWS S3 remote state · Ansible · GitHub Actions · plan-only DR</text>

  <!-- pipeline -->
  <g filter="url(#sh)">
    <rect x="70" y="120" width="300" height="170" rx="14" fill="#241a12" stroke="#5b3a23"/>
    <text x="90" y="152" font-size="13" font-weight="700" fill="#f6f1e8" letter-spacing="2">REGISTRARS</text>
    <text x="90" y="176" font-size="13" fill="#c8b6aa">4 providers, nameservers only</text>
    <g font-size="13" fill="#e9ddd2">
      <text x="90" y="206">name.com</text>
      <text x="90" y="230">Porkbun</text>
      <text x="90" y="254">Bluehost (no API → forced</text>
      <text x="90" y="272">the consolidation)</text>
    </g>
  </g>

  <g filter="url(#sh)">
    <rect x="450" y="110" width="300" height="190" rx="14" fill="url(#cf)" stroke="#8a4a12"/>
    <text x="470" y="142" font-size="13" font-weight="700" fill="#fff" letter-spacing="2">CLOUDFLARE DNS</text>
    <text x="470" y="166" font-size="13" fill="#ffe9d2">authoritative · DNS-only</text>
    <g font-size="14" fill="#fff" font-weight="700">
      <text x="470" y="200">9 zones · 221 records</text>
    </g>
    <g font-size="13" fill="#fff0e2">
      <text x="470" y="226">A · CNAME · MX · TXT · SRV</text>
      <text x="470" y="250">imported into Terraform state,</text>
      <text x="470" y="268">not recreated → no-op plan</text>
    </g>
  </g>

  <g filter="url(#sh)">
    <rect x="830" y="120" width="300" height="170" rx="14" fill="url(#do)" stroke="#1f5237"/>
    <text x="850" y="152" font-size="13" font-weight="700" fill="#f1f6f3" letter-spacing="2">DIGITALOCEAN DROPLET</text>
    <text x="850" y="176" font-size="13" fill="#bcd4c5">203.0.113.10 · 4 vCPU / 16 GB</text>
    <g font-size="13" fill="#e7f0ea">
      <text x="850" y="206">~55 Apache vhosts · certbot TLS</text>
      <text x="850" y="230">app services (Rust, FastAPI, PHP)</text>
      <text x="850" y="254">Postgres · MySQL</text>
      <text x="850" y="272">Prometheus · Grafana</text>
    </g>
  </g>

  <line x1="370" y1="205" x2="446" y2="205" stroke="#f6f1e8" stroke-width="3" marker-end="url(#arr)"/>
  <text x="408" y="196" font-size="11" fill="#a3958a" text-anchor="middle">NS</text>
  <line x1="750" y1="205" x2="826" y2="205" stroke="#f6f1e8" stroke-width="3" marker-end="url(#arr)"/>
  <text x="788" y="196" font-size="11" fill="#a3958a" text-anchor="middle">A record</text>

  <!-- managed-by band -->
  <text x="600" y="360" font-size="13" font-weight="700" fill="#a3958a" text-anchor="middle" letter-spacing="2">INFRASTRUCTURE AS CODE</text>

  <g font-size="13">
    <g filter="url(#sh)">
      <rect x="70" y="390" width="258" height="230" rx="12" fill="#1f1c18" stroke="#3a342c"/>
      <text x="90" y="424" font-size="15" font-weight="700" fill="#f6f1e8">Terraform</text>
      <text x="90" y="452" fill="#c8b6aa">cloudflare/cloudflare v5</text>
      <text x="90" y="476" fill="#c8b6aa">for_each over records,</text>
      <text x="90" y="494" fill="#c8b6aa">gated per zone</text>
      <text x="90" y="522" fill="#c8b6aa">gen-imports.py reconciles</text>
      <text x="90" y="540" fill="#c8b6aa">code to live (drift audit)</text>
      <text x="90" y="582" fill="#7fb79a" font-weight="700">plan = 0 changes</text>
    </g>

    <g filter="url(#sh)">
      <rect x="346" y="390" width="258" height="230" rx="12" fill="#1f1c18" stroke="#3a342c"/>
      <text x="366" y="424" font-size="15" font-weight="700" fill="#f6f1e8">AWS S3 state</text>
      <text x="366" y="452" fill="#c8b6aa">off the compute provider</text>
      <text x="366" y="470" fill="#c8b6aa">for DR independence</text>
      <text x="366" y="498" fill="#c8b6aa">S3-native locking</text>
      <text x="366" y="516" fill="#c8b6aa">(use_lockfile, no DynamoDB)</text>
      <text x="366" y="544" fill="#c8b6aa">versioned · least-priv IAM</text>
      <text x="366" y="582" fill="#7fb79a" font-weight="700">survives a DO outage</text>
    </g>

    <g filter="url(#sh)">
      <rect x="622" y="390" width="258" height="230" rx="12" fill="#1f1c18" stroke="#3a342c"/>
      <text x="642" y="424" font-size="15" font-weight="700" fill="#f6f1e8">Ansible</text>
      <text x="642" y="452" fill="#c8b6aa">new_subdomain role:</text>
      <text x="642" y="470" fill="#c8b6aa">vhost (static/proxy) +</text>
      <text x="642" y="488" fill="#c8b6aa">certbot, DNS-first guard</text>
      <text x="642" y="516" fill="#c8b6aa">base_system role:</text>
      <text x="642" y="534" fill="#c8b6aa">rebuild the stack for DR</text>
      <text x="642" y="582" fill="#7fb79a" font-weight="700">one-command subdomain</text>
    </g>

    <g filter="url(#sh)">
      <rect x="898" y="390" width="232" height="230" rx="12" fill="#1f1c18" stroke="#3a342c"/>
      <text x="918" y="424" font-size="15" font-weight="700" fill="#f6f1e8">DR + CI</text>
      <text x="918" y="452" fill="#c8b6aa">dr/: plan-only droplet</text>
      <text x="918" y="470" fill="#c8b6aa">+ volume + firewall</text>
      <text x="918" y="488" fill="#c8b6aa">never applied to prod</text>
      <text x="918" y="516" fill="#c8b6aa">GitHub Actions:</text>
      <text x="918" y="534" fill="#c8b6aa">fmt · validate · plan-on-PR</text>
      <text x="918" y="582" fill="#7fb79a" font-weight="700">reviewable diffs</text>
    </g>
  </g>

  <text x="600" y="678" font-size="13" fill="#e9ddd2" text-anchor="middle">DNS for ~70 hostnames consolidated from 4 registrars onto Cloudflare and held as code - changed by pull request, not by clicking.</text>
  <text x="600" y="704" font-size="12" fill="#a3958a" text-anchor="middle">Sanitized public mirror of a private production repo. Identifiers are documentation placeholders.</text>
</svg>
